<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm Danh - DSLC 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Roboto', sans-serif; } </style>
</head>
<body class="bg-gray-100 pb-10">

  <nav class="bg-green-800 text-white p-4 shadow-md fixed w-full top-0 z-50 flex justify-between items-center">
    <h1 class="font-bold text-lg">DSLC 2026</h1>
    <button onclick="logout()" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg font-bold transition shadow">Đăng xuất</button>
  </nav>

  <div class="max-w-md mx-auto px-4 pt-20">
    <div class="flex space-x-1 bg-white p-1 rounded-xl shadow-sm border border-gray-100">
      <a href="diemdanh.html" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg bg-green-700 text-white shadow-sm">Điểm danh</a>
      <a href="minhchung.html" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-gray-50 transition">Minh chứng</a>
      <a href="gcn.html" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-gray-50 transition">Nhận GCN</a>
    </div>
  </div>

  <main class="max-w-md mx-auto p-4 mt-2 space-y-5">
    
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
      <h2 class="font-bold text-green-800 text-lg mb-2">Quét mã QR Điểm danh</h2>
      <p class="text-xs text-gray-500 mb-4">Đưa camera vào sát mã QR do Trưởng ca cung cấp để ghi nhận.</p>
      
      <div id="reader" class="rounded-xl overflow-hidden shadow-inner bg-black w-full aspect-square relative"></div>
      
      <div id="result" class="hidden p-4 rounded-xl shadow-sm text-center font-bold text-sm border mt-4"></div>
    </div>
    
    <div>
      <div class="flex justify-between items-end mb-3">
        <h3 class="font-bold text-gray-800">Lịch sử hôm nay</h3>
        <button onclick="loadHistory()" class="text-xs text-blue-600 underline font-medium hover:text-blue-800">Làm mới</button>
      </div>
      <div id="listHistory" class="space-y-3">
        <p class="text-center text-gray-500 bg-white p-4 rounded-xl shadow-sm text-sm border italic">Đang tải dữ liệu...</p>
      </div>
    </div>

  </main>

  <script>
    // NHỚ DÁN LINK SCRIPT MỚI NHẤT CỦA BẠN VÀO ĐÂY
    const API_URL = "https://script.google.com/macros/s/AKfycbxZPGPpvG7Ja9FKo4r_Jqvbt3RoSSBSsr7KtApP7HKTYuZOO3_PG0DheJW-C3PtqcI3/exec";
    const sessionId = sessionStorage.getItem('sessionId');

    // Chặn người dùng chưa đăng nhập
    if(!sessionId) window.location.href = 'index.html';

    // Tự động tải lịch sử khi vừa vào trang
    window.onload = loadHistory;

    function logout() {
      if(confirm("Đăng xuất khỏi tài khoản?")) {
        sessionStorage.clear();
        window.location.href = 'index.html';
      }
    }

    // ==========================================
    // 1. GỌI CAMERA QUÉT QR
    // ==========================================
    const html5QrCode = new Html5Qrcode("reader");
    
    html5QrCode.start(
      { facingMode: "environment" }, // Ưu tiên dùng camera sau của điện thoại
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        html5QrCode.pause(true); // Tạm dừng camera sau khi quét trúng
        handleDiemDanh(decodedText);
      }
    ).catch(err => {
      // Bắt lỗi nếu trình duyệt chặn Camera
      const resBox = document.getElementById('result');
      resBox.classList.remove('hidden');
      resBox.innerHTML = "❌ Không thể mở Camera!<br><span class='text-xs font-normal mt-1 block'>Hãy kiểm tra lại quyền truy cập Máy ảnh (Camera) của trình duyệt.</span>";
      resBox.className = "p-4 bg-red-100 text-red-800 rounded-xl shadow-sm text-center font-bold text-sm border border-red-200 mt-4";
      console.error("Lỗi khởi tạo Camera: ", err);
    });

    // ==========================================
    // 2. LẤY GPS VÀ CHUẨN BỊ GỬI
    // ==========================================
    async function handleDiemDanh(qrData) {
      const resBox = document.getElementById('result');
      resBox.classList.remove('hidden');
      resBox.innerText = "📍 Đang lấy vị trí GPS hiện tại...";
      resBox.className = "p-4 bg-blue-100 text-blue-800 rounded-xl shadow-sm text-center font-bold text-sm border border-blue-200 mt-4";

      // Kiểm tra xem trình duyệt có hỗ trợ GPS không
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          // Nếu người dùng cho phép lấy vị trí
          async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            sendDataToServer(qrData, lat, lng);
          },
          // Nếu bị lỗi (tắt định vị, từ chối cấp quyền)
          (error) => {
            resBox.innerHTML = "❌ Không lấy được vị trí GPS.<br><span class='text-xs font-normal mt-1 block'>Hãy bật Định vị (Location) trên điện thoại và tải lại trang!</span>";
            resBox.className = "p-4 bg-red-100 text-red-800 rounded-xl shadow-sm text-center font-bold text-sm border border-red-200 mt-4";
            setTimeout(() => { resBox.classList.add('hidden'); html5QrCode.resume(); }, 4000);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } // Ép lấy tọa độ chính xác cao
        );
      } else {
        resBox.innerText = "❌ Trình duyệt/Điện thoại của bạn không hỗ trợ tính năng định vị!";
        resBox.className = "p-4 bg-red-100 text-red-800 rounded-xl shadow-sm text-center font-bold text-sm border border-red-200 mt-4";
        setTimeout(() => { resBox.classList.add('hidden'); html5QrCode.resume(); }, 4000);
      }
    }

    // ==========================================
    // 3. GỬI DỮ LIỆU ĐIỂM DANH LÊN MÁY CHỦ
    // ==========================================
    async function sendDataToServer(qrData, lat, lng) {
      const resBox = document.getElementById('result');
      resBox.innerText = "⏳ Đang đối chiếu vị trí với hệ thống...";

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ 
            action: 'diemDanhTNV', 
            sessionId: sessionId, 
            qrCode: qrData,
            lat: lat,
            lng: lng,
            userAgent: navigator.userAgent // Fix lỗi undefined trên Sheet
          })
        });
        const res = await response.json();
        
        if (res.success) {
          resBox.innerText = "✅ " + res.message;
          resBox.className = "p-4 bg-green-100 text-green-800 rounded-xl shadow-sm text-center font-bold text-sm border border-green-200 mt-4";
          // Tải lại lịch sử ngay sau khi quét thành công
          loadHistory(); 
        } else {
          resBox.innerText = "❌ " + res.error;
          resBox.className = "p-4 bg-red-100 text-red-800 rounded-xl shadow-sm text-center font-bold text-sm border border-red-200 mt-4";
        }
        
        // Tự động mở quét lại sau 3.5 giây
        setTimeout(() => { 
          resBox.classList.add('hidden'); 
          html5QrCode.resume(); 
        }, 3500); 

      } catch (e) {
        resBox.innerText = "❌ Lỗi kết nối mạng. Vui lòng thử lại!";
        resBox.className = "p-4 bg-red-100 text-red-800 rounded-xl shadow-sm text-center font-bold text-sm border border-red-200 mt-4";
        setTimeout(() => { resBox.classList.add('hidden'); html5QrCode.resume(); }, 3000);
      }
    }

    // ==========================================
    // 4. LOGIC TẢI LỊCH SỬ ĐIỂM DANH TỪ SHEET
    // ==========================================
    async function loadHistory() {
      const list = document.getElementById('listHistory');
      list.innerHTML = '<p class="text-center text-gray-500 bg-white p-4 rounded-xl shadow-sm text-sm border italic">Đang tải lịch sử...</p>';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'getLichSuDiemDanhTNV', sessionId: sessionId })
        });
        const res = await response.json();
        
        if(res.success) {
          if(res.data.length === 0) {
            list.innerHTML = '<p class="text-center text-gray-500 bg-white p-4 rounded-xl text-sm shadow-sm border italic">Chưa có dữ liệu điểm danh.</p>';
            return;
          }

          let html = '';
          res.data.forEach(item => {
            html += `
              <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                  <h4 class="font-bold text-gray-800 text-sm">Điểm danh (${item.thoiGian})</h4>
                  <p class="text-[11px] text-gray-500 mt-1 flex items-center gap-1">📍 Khu vực: ${item.diaDiem}</p>
                  ${item.ghiChu ? `<p class="text-[10px] text-red-500 mt-1 font-medium bg-red-50 inline-block px-1.5 py-0.5 rounded border border-red-100">${item.ghiChu}</p>` : ''}
                </div>
                <div class="text-right">
                  <span class="text-[10px] bg-green-100 text-green-800 font-bold px-2 py-1 rounded-md border border-green-200 whitespace-nowrap">${item.trangThai}</span>
                </div>
              </div>`;
          });
          list.innerHTML = html;
        } else {
          list.innerHTML = `<p class="text-center text-red-500 bg-white p-4 rounded-xl text-sm shadow-sm border italic">Lỗi: ${res.error}</p>`;
        }
      } catch (e) {
        list.innerHTML = `<p class="text-center text-red-500 bg-white p-4 rounded-xl text-sm shadow border italic">Lỗi kết nối khi tải lịch sử.</p>`;
      }
    }
  </script>
</body>
</html>
