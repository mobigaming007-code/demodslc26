<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Điểm danh TNV</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-10">

  <nav class="bg-green-800 text-white p-4 shadow-md fixed w-full top-0 z-50 flex justify-between items-center">
    <h1 class="font-bold text-lg">Đổi sách lấy cây</h1>
    <button onclick="logout()" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg font-bold transition shadow">Đăng xuất</button>
  </nav>

  <div class="max-w-md mx-auto px-4 pt-20">
    <div class="flex space-x-1 bg-white p-1 rounded-xl shadow-sm border border-gray-100">
      <a href="/diemdanh" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg bg-green-100 text-green-700 transition">Điểm danh</a>
      <a href="/minhchung" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-gray-50 transition">Minh chứng</a>
      <a href="/gcn" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-gray-50 transition">Nhận GCN</a>
    </div>
  </div>

  <main class="max-w-md mx-auto p-4 mt-2 space-y-5">

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <p class="text-xs text-gray-400 font-bold uppercase">Thông tin TNV</p>
      <h2 id="txtName" class="text-xl font-black text-gray-800 mt-1">Đang tải...</h2>
      <p id="txtMaTNV" class="text-sm text-green-700 font-bold"></p>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
      <div>
        <p class="text-xs text-gray-400 font-bold uppercase">Điểm danh</p>
        <p class="text-sm text-gray-600 mt-1">Quét hoặc nhập mã QR điểm trực để check-in/check-out.</p>
      </div>

      <input id="qrInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Nhập mã QR / mã điểm trực" />

      <div class="grid grid-cols-2 gap-2">
        <button onclick="submitDiemDanh('CHECKIN')" class="bg-green-700 hover:bg-green-800 text-white font-bold rounded-xl py-3 text-sm shadow-sm">
          Check-in
        </button>
        <button onclick="submitDiemDanh('CHECKOUT')" class="bg-blue-700 hover:bg-blue-800 text-white font-bold rounded-xl py-3 text-sm shadow-sm">
          Check-out
        </button>
      </div>

      <p id="msgBox" class="hidden text-sm font-bold rounded-xl p-3"></p>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <div class="flex items-center justify-between mb-3">
        <div>
          <p class="text-xs text-gray-400 font-bold uppercase">Lịch sử điểm danh</p>
          <p class="text-[11px] text-gray-400 mt-1">Hiển thị cả check-in chưa check-out.</p>
        </div>
        <button onclick="loadHistory()" class="text-xs text-green-700 font-bold underline">Làm mới</button>
      </div>

      <div id="historyList" class="space-y-3">
        <p class="text-xs text-gray-400 italic">Đang tải lịch sử điểm danh...</p>
      </div>
    </section>

  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyRuxAmBxOL_sz4FbzTIVP6tQou0g-33nNXkcZI9juHwar_wQz2N-KzK-hXdwaulQwQDg/exec";
    const sessionId = sessionStorage.getItem("sessionId") || localStorage.getItem("sessionId") || "";

    if (!sessionId) {
      alert("Vui lòng đăng nhập lại.");
      window.location.href = "/";
    }

    window.onload = function () {
      loadTNVInfo();
      loadHistory();
    };

    function logout() {
      sessionStorage.clear();
      localStorage.clear();
      window.location.href = "/";
    }

    function showMessage(type, text) {
      const box = document.getElementById("msgBox");
      box.classList.remove("hidden", "bg-green-50", "text-green-700", "bg-red-50", "text-red-700", "bg-yellow-50", "text-yellow-700");

      if (type === "success") box.classList.add("bg-green-50", "text-green-700");
      else if (type === "warning") box.classList.add("bg-yellow-50", "text-yellow-700");
      else box.classList.add("bg-red-50", "text-red-700");

      box.innerText = text;
    }

    async function callApi(payload) {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      return await response.json();
    }

    async function loadTNVInfo() {
      try {
        const res = await callApi({ action: "getTNVInfoClient", sessionId });
        if (res.success && res.data) {
          document.getElementById("txtName").innerText = res.data.hoTen || "Tình nguyện viên";
          document.getElementById("txtMaTNV").innerText = res.data.maTNV || "";
        }
      } catch (err) {
        document.getElementById("txtName").innerText = "Tình nguyện viên";
      }
    }

    async function submitDiemDanh(loai) {
      const qrCode = document.getElementById("qrInput").value.trim();
      if (!qrCode) {
        showMessage("warning", "Vui lòng nhập hoặc quét mã QR điểm danh.");
        return;
      }

      try {
        showMessage("warning", "Đang ghi nhận điểm danh...");

        const res = await callApi({
          action: "submitDiemDanh",
          sessionId,
          qrCode,
          loai
        });

        if (res.success) {
          showMessage("success", res.message || "Điểm danh thành công.");
          document.getElementById("qrInput").value = "";
          await loadHistory();
        } else {
          showMessage("error", res.error || "Không thể điểm danh.");
        }
      } catch (err) {
        showMessage("error", "Lỗi kết nối hệ thống điểm danh.");
      }
    }

    async function loadHistory() {
      const box =
        document.getElementById("historyList") ||
        document.getElementById("historyBox") ||
        document.getElementById("lichSuDiemDanh");

      if (!box) return;

      box.innerHTML = `<p class="text-xs text-gray-400 italic">Đang tải lịch sử điểm danh...</p>`;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "getLichSuDiemDanhTNV",
            sessionId
          })
        });

        const res = await response.json();

        if (!res.success) {
          box.innerHTML = `<p class="text-xs text-red-500">${res.error || "Không tải được lịch sử điểm danh."}</p>`;
          return;
        }

        if (!res.data || res.data.length === 0) {
          box.innerHTML = `<p class="text-xs text-gray-400 italic">Chưa có lịch sử điểm danh.</p>`;
          return;
        }

        box.innerHTML = res.data.map(item => {
          let badgeClass = "bg-gray-100 text-gray-700";

          if (item.trangThai === "Hoàn tất") {
            badgeClass = "bg-green-100 text-green-700";
          } else if (item.trangThai === "Chỉ check-in") {
            badgeClass = "bg-yellow-100 text-yellow-700";
          } else if (item.trangThai === "Chỉ check-out") {
            badgeClass = "bg-red-100 text-red-700";
          }

          return `
            <div class="bg-white border border-gray-100 rounded-xl p-3 shadow-sm">
              <div class="flex justify-between items-start gap-2">
                <div>
                  <p class="font-bold text-sm text-gray-800">${item.thoiGian} - ${item.buoi}</p>
                  <p class="text-xs text-gray-500 mt-1">${item.diaDiem}</p>
                </div>
                <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${badgeClass}">
                  ${item.trangThai}
                </span>
              </div>

              <div class="grid grid-cols-2 gap-2 mt-3 text-xs">
                <div class="bg-gray-50 rounded-lg p-2">
                  <p class="text-gray-400">Check-in</p>
                  <p class="font-bold text-gray-800">${item.checkIn || "--:--"}</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-2">
                  <p class="text-gray-400">Check-out</p>
                  <p class="font-bold text-gray-800">${item.checkOut || "--:--"}</p>
                </div>
              </div>

              <p class="text-[11px] text-gray-500 mt-2">${item.ghiChu || ""}</p>
            </div>
          `;
        }).join("");

      } catch (err) {
        box.innerHTML = `<p class="text-xs text-red-500">Lỗi tải lịch sử điểm danh.</p>`;
      }
    }
  </script>
</body>
</html>
