<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Đổi Sách Lấy Cây 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Roboto', sans-serif; } </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full border border-gray-100">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black text-green-700 leading-tight">ĐỔI SÁCH LẤY CÂY<br>2026</h1>
      <p class="text-xs text-gray-400 mt-2 font-medium tracking-widest uppercase">Cổng thông tin nội bộ</p>
    </div>

    <div id="resultBox" class="hidden p-3 rounded-xl text-sm text-center font-bold mb-6 transition-all"></div>

    <div id="formTNV" class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Tài khoản Tình nguyện viên</label>
        <input type="text" id="maTNV" class="w-full border-2 border-gray-100 rounded-2xl p-4 bg-gray-50 focus:outline-none focus:border-green-600 focus:bg-white transition-all uppercase font-bold text-gray-700" placeholder="Mã TNV hoặc Số điện thoại...">
      </div>
      <button id="btnTNV" onclick="handleLogin('TNV')" class="w-full bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-200 hover:bg-green-800 active:scale-95 transition-all">
        VÀO HỆ THỐNG
      </button>
      <button onclick="toggleView()" class="w-full text-xs text-gray-400 underline hover:text-blue-900 transition">Dành cho Ban điều hành</button>
    </div>

    <div id="formAdmin" class="hidden space-y-5">
      <div>
        <label class="block text-xs font-bold text-blue-900 uppercase mb-2 ml-1">Email Ban điều hành</label>
        <input type="email" id="adminUser" class="w-full border-2 border-gray-100 rounded-2xl p-4 bg-gray-50 focus:outline-none focus:border-blue-900 focus:bg-white transition-all font-bold mb-4" placeholder="Nhập Email đã phân quyền...">
        
        <label class="block text-xs font-bold text-blue-900 uppercase mb-2 ml-1">Mật khẩu</label>
        <input type="password" id="adminPass" class="w-full border-2 border-gray-100 rounded-2xl p-4 bg-gray-50 focus:outline-none focus:border-blue-900 focus:bg-white transition-all font-bold" placeholder="••••••••">
      </div>
      <button id="btnAdmin" onclick="handleLogin('Admin')" class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-black active:scale-95 transition-all">
        XÁC THỰC QUẢN TRỊ
      </button>
      <button onclick="toggleView()" class="w-full text-xs text-gray-400 underline hover:text-green-700 transition">Quay lại trang Tình nguyện viên</button>
    </div>
  </div>

  <script>
    // ==========================================
    // DÁN LINK WEB APP CỦA BẠN VÀO DÒNG DƯỚI ĐÂY
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzfY7ysLsxRX6lInHkg2Bv0vHTa9qzoHlCPbiBC6SJ_hpEY9fkmcyjwR0Jjus0SCW14rw/exec";

    window.onload = () => {
      const currentSession = sessionStorage.getItem('sessionId');
      const currentRole = sessionStorage.getItem('role');
      if(currentSession) {
        window.location.href = currentRole === 'Admin' ? 'admin.html' : 'diemdanh.html';
      }
    };

    function toggleView() {
      document.getElementById('formTNV').classList.toggle('hidden');
      document.getElementById('formAdmin').classList.toggle('hidden');
      document.getElementById('resultBox').classList.add('hidden');
    }

    function showMsg(isSuccess, text) {
      const box = document.getElementById('resultBox');
      box.className = `p-3 rounded-xl text-sm text-center font-bold mb-6 ${isSuccess ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
      box.innerText = text;
      box.classList.remove('hidden');
    }

    async function handleLogin(role) {
      const btn = role === 'TNV' ? document.getElementById('btnTNV') : document.getElementById('btnAdmin');
      const payload = { action: role === 'TNV' ? 'loginTNV' : 'loginAdmin' };
      
      if(role === 'TNV') {
        payload.maTNV = document.getElementById('maTNV').value.trim();
        if(!payload.maTNV) return showMsg(false, "Vui lòng nhập Mã TNV hoặc Số điện thoại!");
      } else {
        payload.user = document.getElementById('adminUser').value.trim();
        payload.pass = document.getElementById('adminPass').value.trim();
        if(!payload.user || !payload.pass) return showMsg(false, "Vui lòng nhập đầy đủ Email và Mật khẩu!");
      }

      btn.disabled = true;
      btn.innerText = "⏳ ĐANG KIỂM TRA...";

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'cors',
          // Lệnh lách luật CORS kinh điển của JS khi gọi API Google Script
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const res = await response.json();
        
        if(res.success) {
          showMsg(true, "✅ Thành công! Đang chuyển hướng...");
          
          // Lưu session và vai trò
          sessionStorage.setItem('sessionId', res.sessionId);
          sessionStorage.setItem('role', res.role || role);
          
          // Lưu thông tin phân quyền của Admin để dùng ở trang admin.html
          if(res.adminName) sessionStorage.setItem('adminName', res.adminName);
          if(res.capQuyen) sessionStorage.setItem('capQuyen', res.capQuyen);
          if(res.phamVi) sessionStorage.setItem('phamVi', res.phamVi);
          
          setTimeout(() => {
            window.location.href = (res.role === 'Admin' || role === 'Admin') ? 'admin.html' : 'diemdanh.html';
          }, 800);
          
        } else {
          showMsg(false, "❌ " + res.error);
          btn.disabled = false;
          btn.innerText = role === 'TNV' ? "VÀO HỆ THỐNG" : "XÁC THỰC QUẢN TRỊ";
        }
      } catch (err) {
        showMsg(false, "❌ Máy chủ không phản hồi. Vui lòng kiểm tra lại quyền truy cập (Anyone) trên Google Script!");
        btn.disabled = false;
        btn.innerText = role === 'TNV' ? "VÀO HỆ THỐNG" : "XÁC THỰC QUẢN TRỊ";
      }
    }
  </script>
</body>
</html>
