<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - DSLC 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { greenDSLC: '#2E7D32' } } }
    }
  </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-black text-greenDSLC">ĐỔI SÁCH LẤY CÂY</h1>
      <p class="text-sm text-gray-500 font-medium mt-1">Cổng thông tin Tình nguyện viên</p>
    </div>

    <div id="resultBox" class="hidden p-3 rounded-lg text-sm text-center font-bold mb-4"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tài khoản (Mã TNV / SĐT)</label>
        <input type="text" id="username" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none focus:border-greenDSLC focus:ring-1 focus:ring-greenDSLC" placeholder="Nhập mã TNV...">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
        <input type="password" id="password" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none focus:border-greenDSLC focus:ring-1 focus:ring-greenDSLC" placeholder="Nhập mật khẩu...">
      </div>

      <button id="btnLogin" onclick="login()" class="w-full bg-greenDSLC text-white font-bold py-3.5 rounded-lg mt-2 shadow hover:bg-green-800 transition">
        ĐĂNG NHẬP
      </button>
    </div>
  </div>

  <script>
    // THAY LINK WEB APP API CỦA BẠN VÀO ĐÂY
    const API_URL = "DÁN_LINK_WEB_APP_EXEC_CỦA_BẠN_VÀO_ĐÂY";

    // Nếu đã có session thì chuyển thẳng vào trang điểm danh luôn
    window.onload = () => {
      if(sessionStorage.getItem('sessionId')) {
        window.location.href = 'diemdanh.html';
      }
    };

    function showResult(success, message) {
      const box = document.getElementById('resultBox');
      box.classList.remove('hidden', 'bg-red-100', 'text-red-800', 'bg-green-100', 'text-green-800', 'bg-blue-100', 'text-blue-800');
      box.classList.add(success ? 'bg-green-100' : 'bg-red-100', success ? 'text-green-800' : 'text-red-800');
      box.innerHTML = message;
    }

    async function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();

      if(!u || !p) return showResult(false, "Vui lòng nhập đầy đủ thông tin!");

      const btn = document.getElementById('btnLogin');
      btn.innerText = '⏳ Đang kiểm tra...';
      btn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'login', // Lệnh báo cho server biết đây là đăng nhập
            username: u,
            password: p
          })
        });
        
        const res = await response.json();

        if (res.success) {
          showResult(true, "✅ Đăng nhập thành công!");
          // LƯU SESSION ID VÀO TRÌNH DUYỆT
          sessionStorage.setItem('sessionId', res.sessionId);
          
          // Chuyển hướng người dùng (Admin vào trang admin, TNV vào trang điểm danh)
          setTimeout(() => {
            if(res.role === 'Admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'diemdanh.html';
            }
          }, 1000);

        } else {
          showResult(false, "❌ " + res.error);
          btn.innerText = 'ĐĂNG NHẬP';
          btn.disabled = false;
        }
      } catch (error) {
        showResult(false, "❌ Lỗi mạng hoặc máy chủ không phản hồi!");
        btn.innerText = 'ĐĂNG NHẬP';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
