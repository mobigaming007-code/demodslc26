<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - DSLC 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    /* Thanh cuộn ngang ẩn cho menu mobile */
    .menu-scroll { overflow-x: auto; scrollbar-width: none; }
    .menu-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="pb-10">

  <nav class="bg-gray-900 text-white p-4 shadow-md fixed w-full top-0 z-50 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <h1 class="font-bold text-lg text-yellow-400">ADMIN DSLC</h1>
      <span id="adminNameDisplay" class="text-xs bg-gray-700 px-2 py-1 rounded hidden md:inline-block"></span>
    </div>
    <button onclick="logout()" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg font-bold transition shadow">Đăng xuất</button>
  </nav>

  <div class="max-w-5xl mx-auto px-2 pt-20 mb-4">
    <div class="menu-scroll bg-white p-1 rounded-xl shadow-sm border border-gray-200">
      <div class="flex space-x-1 min-w-max">
        <button onclick="switchTab('dashboard')" id="btn-dashboard" class="px-4 py-2 text-xs font-bold rounded-lg bg-gray-900 text-white transition">Tổng quan</button>
        
        <button onclick="switchTab('minhchung')" id="btn-minhchung" class="px-4 py-2 text-xs font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition relative">
          Duyệt MC <span id="badge-mc" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] px-1.5 rounded-full">0</span>
        </button>
        
        <button onclick="switchTab('gcn')" id="btn-gcn" class="px-4 py-2 text-xs font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition relative">
          Duyệt GCN <span id="badge-gcn" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] px-1.5 rounded-full">0</span>
        </button>

        <button onclick="switchTab('nolink')" id="btn-nolink" class="px-4 py-2 text-xs font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition relative">
          Nợ Link GCN <span id="badge-nolink" class="hidden absolute -top-1 -right-1 bg-orange-500 text-white text-[9px] px-1.5 rounded-full">0</span>
        </button>

        <button onclick="switchTab('lichsumc')" id="btn-lichsumc" class="px-4 py-2 text-xs font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition">
          Lịch sử MC
        </button>

        <button onclick="switchTab('lichSuGCN')" class="tab-btn px-4 py-2 text-sm font-medium hover:text-yellow-400 transition-colors">
          Lịch sử GCN
        </button>
      </div>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-2 space-y-6">

    <div id="tab-dashboard" class="tab-content active">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
          <p class="text-[10px] text-gray-500 font-bold uppercase">MC Chờ Duyệt</p>
          <p id="stat-mc" class="text-2xl font-bold text-blue-600 mt-1">-</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
          <p class="text-[10px] text-gray-500 font-bold uppercase">GCN Chờ Cấp</p>
          <p id="stat-gcn" class="text-2xl font-bold text-yellow-600 mt-1">-</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
          <p class="text-[10px] text-gray-500 font-bold uppercase">GCN Nợ Link</p>
          <p id="stat-nolink" class="text-2xl font-bold text-orange-600 mt-1">-</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
          <p class="text-[10px] text-gray-500 font-bold uppercase">Tổng lượt quét</p>
          <p id="stat-raw" class="text-2xl font-bold text-green-600 mt-1">-</p>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b flex justify-between">
          <h2 class="font-bold text-gray-800 text-sm">Điểm danh gần nhất (Toàn hệ thống)</h2>
          <button onclick="loadDashboard()" class="text-xs text-blue-600 underline">Làm mới</button>
        </div>
        <div id="recentLogs" class="p-4 space-y-2"></div>
      </div>
    </div>

    <div id="tab-minhchung" class="tab-content">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b flex justify-between">
          <h2 class="font-bold text-gray-800 text-sm">Minh chứng chờ duyệt</h2>
          <button onclick="loadMinhChung()" class="text-xs text-blue-600 underline">Làm mới</button>
        </div>
        <div id="listMinhChung" class="p-4 space-y-4 text-sm"></div>
      </div>
    </div>

    <div id="tab-gcn" class="tab-content">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b flex justify-between">
          <h2 class="font-bold text-gray-800 text-sm">Yêu cầu GCN chờ duyệt</h2>
          <button onclick="loadGCN()" class="text-xs text-blue-600 underline">Làm mới</button>
        </div>
        <div id="listGCN" class="p-4 space-y-4 text-sm"></div>
      </div>
    </div>

    <div id="tab-nolink" class="tab-content">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-orange-50 px-4 py-3 border-b border-orange-100 flex justify-between">
          <h2 class="font-bold text-orange-800 text-sm">Danh sách GCN đã duyệt nhưng Nợ Link</h2>
          <button onclick="loadNoLink()" class="text-xs text-blue-600 underline">Làm mới</button>
        </div>
        <div id="listNoLink" class="p-4 space-y-4 text-sm"></div>
      </div>
    </div>

    <div id="tab-lichsumc" class="tab-content">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b flex justify-between">
          <h2 class="font-bold text-gray-800 text-sm">Lịch sử Duyệt Minh Chứng (50 lượt gần nhất)</h2>
          <button onclick="loadLichSuMC()" class="text-xs text-blue-600 underline">Làm mới</button>
        </div>
        <div id="listLichSuMC" class="p-4 space-y-3 text-sm"></div>
      </div>
    </div>

    <div id="lichSuGCN" class="tab-content mt-20 px-4">
  <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
    <h2 class="font-bold text-gray-800 mb-3">Lịch sử & Điều chỉnh GCN</h2>
    <div class="relative mb-4">
      <input type="text" id="inputSearchGCN" onkeyup="filterGCN()" placeholder="Tìm Mã TNV hoặc SĐT..." 
             class="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
      <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
    </div>

    <div id="listLichSuGCN" class="space-y-3">
      </div>
  </div>
</div>

<div id="modalEditGCN" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-md p-6">
    <h3 class="font-bold text-lg mb-4">Điều chỉnh yêu cầu GCN</h3>
    <input type="hidden" id="editMaYC">
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">Trạng thái</label>
        <select id="editStatusGCN" class="w-full border rounded-lg p-2 text-sm">
          <option value="Hẹn ngày trả">Hẹn ngày trả</option>
          <option value="Đã trả GCN">Đã trả GCN</option>
          <option value="Từ chối">Từ chối</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">Ngày hẹn trả</label>
        <input type="date" id="editNgayHenGCN" class="w-full border rounded-lg p-2 text-sm">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">Link GCN (Drive)</label>
        <input type="text" id="editLinkGCN" class="w-full border rounded-lg p-2 text-sm" placeholder="Dán link PDF...">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">Ghi chú/Lý do</label>
        <textarea id="editGhiChuGCN" class="w-full border rounded-lg p-2 text-sm" rows="2"></textarea>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="closeModalGCN()" class="flex-1 py-2 bg-gray-100 rounded-xl text-sm font-bold">Hủy</button>
      <button onclick="submitUpdateGCN()" class="flex-1 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold">Cập nhật</button>
    </div>
  </div>
</div>

  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxB6GSnssJV3qXKDuAlz4VKujAougIg-GCQHJrwNwC_mMFrvPJeSVsha0ZWpr9RUHRB/exec";
    const sessionId = sessionStorage.getItem('sessionId');
    const adminName = sessionStorage.getItem('adminName') || "Admin";

    if (!sessionId || !sessionId.startsWith("ADMIN_")) {
      alert("Bạn không có quyền truy cập!");
      window.location.href = "index.html";
    }

    document.getElementById('adminNameDisplay').innerText = "Chào, " + adminName;

    window.onload = () => {
      loadDashboard();
      loadMinhChung(true); 
      loadGCN(true);
      loadNoLink(true);
    };

    function logout() {
      if(confirm("Đăng xuất?")) { sessionStorage.clear(); window.location.href = 'index.html'; }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      
      document.querySelectorAll('button[id^="btn-"]').forEach(btn => {
        btn.classList.remove('bg-gray-900', 'text-white');
        btn.classList.add('text-gray-600', 'hover:bg-gray-100');
      });
      const activeBtn = document.getElementById('btn-' + tabId);
      activeBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
      activeBtn.classList.add('bg-gray-900', 'text-white');

      if (tabId === 'dashboard') loadDashboard();
      if (tabId === 'minhchung') loadMinhChung();
      if (tabId === 'gcn') loadGCN();
      if (tabId === 'nolink') loadNoLink();
      if (tabId === 'lichsumc') loadLichSuMC();
    }

    function updateBadge(id, count) {
      const el = document.getElementById(id);
      if (count > 0) { el.innerText = count; el.classList.remove('hidden'); } 
      else el.classList.add('hidden');
    }

    // --- TAB 1: DASHBOARD ---
    async function loadDashboard() {
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAdminDashboard', sessionId }) });
        const res = await response.json();
        if (res.success) {
          document.getElementById('stat-mc').innerText = res.stats.mcChoDuyet;
          document.getElementById('stat-gcn').innerText = res.stats.gcnChoDuyet;
          document.getElementById('stat-nolink').innerText = res.stats.noLinkGCN;
          document.getElementById('stat-raw').innerText = res.stats.tongLuotRaw;

          updateBadge('badge-mc', res.stats.mcChoDuyet);
          updateBadge('badge-gcn', res.stats.gcnChoDuyet);
          updateBadge('badge-nolink', res.stats.noLinkGCN);

          const logsContainer = document.getElementById('recentLogs');
          if (res.recentLogs.length === 0) logsContainer.innerHTML = "<p class='italic text-gray-400'>Chưa có dữ liệu.</p>";
          else {
            logsContainer.innerHTML = res.recentLogs.map(log => `
              <div class="flex justify-between items-center border-b pb-2">
                <div><p class="font-bold text-gray-800">${log.hoTen} (${log.maTNV})</p><p class="text-[11px] text-gray-500">${log.thoiGian}</p></div>
                <span class="text-xs font-bold ${log.hopLe ? 'text-green-600' : 'text-red-600'}">${log.loai} ${log.hopLe ? '✅' : '❌'}</span>
              </div>`).join('');
          }
        }
      } catch (e) { console.error("Lỗi: ", e); }
    }

    // --- TAB 2: DUYỆT MC ---
    async function loadMinhChung(isSilent = false) {
      const container = document.getElementById('listMinhChung');
      if(!isSilent) container.innerHTML = 'Đang tải...';
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDanhSachMinhChungChoXet', sessionId }) });
        const res = await response.json();
        if (res.success) {
          updateBadge('badge-mc', res.data.length);
          if (isSilent) return;
          if (res.data.length === 0) { container.innerHTML = "Đã duyệt hết MC."; return; }

          container.innerHTML = res.data.map(item => `
            <div class="border rounded-xl p-4 bg-gray-50 md:flex gap-4">
              <div class="md:w-1/4 mb-3 md:mb-0">
                ${item.anhUrl ? `<a href="${item.anhUrl}" target="_blank"><img src="${item.anhUrl}" class="w-full h-24 object-cover rounded shadow border"></a>` : 'Không ảnh'}
              </div>
              <div class="md:w-3/4">
                <p class="font-bold">${item.hoTen} (${item.maTNV})</p> 
                <p class="text-xs text-blue-600 font-bold mt-1">📞 SĐT: ${item.sdt}</p>
                <p class="text-[11px] text-gray-500">Gửi: ${item.thoiGian} | Hạng mục: ${item.hangMuc}</p>
                <p class="mt-1 text-xs bg-white p-2 border rounded">${item.moTa}</p>
                <div class="mt-2 grid grid-cols-2 md:grid-cols-4 gap-2">
                  <input type="number" id="buoi-${item.maMC}" placeholder="Số buổi" class="border p-2 rounded" step="0.5">
                  <input type="text" id="note-${item.maMC}" placeholder="Ghi chú" class="border p-2 rounded col-span-1 md:col-span-1">
                  <button onclick="submitDuyetMC('${item.maMC}', 'Đã duyệt')" class="bg-green-600 text-white font-bold rounded shadow">Duyệt</button>
                  <button onclick="submitDuyetMC('${item.maMC}', 'Từ chối')" class="bg-red-600 text-white font-bold rounded shadow">Từ chối</button>
                </div>
              </div>
            </div>`).join('');
        }
      } catch (e) {}
    }

    async function submitDuyetMC(maMC, status) {
      const soBuoi = parseFloat(document.getElementById('buoi-' + maMC).value) || 0;
      const ghiChu = document.getElementById('note-' + maMC).value;
      if (status === 'Đã duyệt' && soBuoi <= 0) return alert("Nhập số buổi > 0");
      if (status === 'Từ chối' && !ghiChu) return alert("Nhập lý do từ chối");

      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'adminDuyetMinhChung', sessionId, maMC, status, soBuoi, ghiChu, adminName }) });
      const res = await response.json();
      if (res.success) { alert("Xong!"); loadMinhChung(); loadDashboard(); }
    }

    // --- TAB 3: DUYỆT GCN ---
    async function loadGCN(isSilent = false) {
      const container = document.getElementById('listGCN');
      if(!isSilent) container.innerHTML = 'Đang tải...';
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDanhSachYeuCauGCN', sessionId }) });
        const res = await response.json();
        if (res.success) {
          updateBadge('badge-gcn', res.data.length);
          if (isSilent) return;
          if (res.data.length === 0) { container.innerHTML = "Không có yêu cầu."; return; }

          container.innerHTML = res.data.map(item => `
            <div class="border rounded-xl p-4 bg-gray-50">
              <div class="flex justify-between">
                <p class="font-bold">${item.hoTen} (${item.maTNV})</p> 
                <p class="text-xs text-blue-600 font-bold mt-1">📞 SĐT: ${item.sdt}</p>
                <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded font-bold">${item.tongBuoi} buổi</span>
              </div>
              <p class="text-sm">Loại: <b>${item.loaiGCN}</b> (Đợt ${item.dot})</p>
              <div class="mt-2 grid grid-cols-2 gap-2">
                <input type="text" id="ngayhen-${item.maYC}" placeholder="Ngày hẹn trả" class="border p-2 rounded">
                <input type="text" id="url-${item.maYC}" placeholder="Link GCN" class="border p-2 rounded">
                <input type="text" id="ghichu-gcn-${item.maYC}" placeholder="Ghi chú / Lý do từ chối" class="border p-2 rounded col-span-2">
              </div>
              <div class="mt-2 flex gap-2">
                <button onclick="submitDuyetGCN('${item.maYC}', 'Hoàn thành')" class="flex-1 bg-green-600 text-white font-bold py-1.5 rounded">Cấp</button>
                <button onclick="submitDuyetGCN('${item.maYC}', 'Hẹn ngày trả')" class="flex-1 bg-yellow-500 text-white font-bold py-1.5 rounded">Hẹn trả</button>
                <button onclick="submitDuyetGCN('${item.maYC}', 'Từ chối')" class="flex-1 bg-red-600 text-white font-bold py-1.5 rounded">Từ chối</button>
              </div>
            </div>`).join('');
        }
      } catch (e) {}
    }

    async function submitDuyetGCN(maYC, status) {
      const ngayHen = document.getElementById('ngayhen-' + maYC).value;
      const urlGCN = document.getElementById('url-' + maYC).value;
      const ghiChu = document.getElementById('ghichu-gcn-' + maYC).value;
      if (status === 'Từ chối' && !ghiChu) return alert("Nhập lý do từ chối");

      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'adminCapGCN', sessionId, maYC, status, ngayHen, urlGCN, ghiChu, adminName }) });
      const res = await response.json();
      if (res.success) { alert("Xong!"); loadGCN(); loadNoLink(); loadDashboard(); }
    }

    // --- TAB 4: NỢ LINK GCN ---
    async function loadNoLink(isSilent = false) {
      const container = document.getElementById('listNoLink');
      if(!isSilent) container.innerHTML = 'Đang tải...';
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDanhSachNoLinkGCN', sessionId }) });
        const res = await response.json();
        if (res.success) {
          updateBadge('badge-nolink', res.data.length);
          if (isSilent) return;
          if (res.data.length === 0) { container.innerHTML = "Không có hồ sơ nợ link."; return; }

          container.innerHTML = res.data.map(item => `
            <div class="border border-orange-200 rounded-xl p-4 bg-white shadow-sm flex flex-col md:flex-row gap-2 justify-between items-center">
              <div>
                <p class="font-bold text-gray-800">${item.hoTen} <span class="font-normal text-gray-500">(${item.maTNV})</span></p>
                <p class="text-xs text-orange-600 font-bold">Loại: ${item.loaiGCN} (Đợt ${item.dot})</p>
              </div>
              <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                <input type="text" id="addurl-${item.maYC}" placeholder="Dán link Drive GCN vào đây" class="border border-gray-300 p-2 rounded w-full md:w-64 text-xs focus:outline-blue-500">
                <button onclick="submitUpdateLink('${item.maYC}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded text-xs whitespace-nowrap shadow-sm">Cập nhật</button>
              </div>
            </div>`).join('');
        }
      } catch (e) {}
    }

    async function submitUpdateLink(maYC) {
      const urlGCN = document.getElementById('addurl-' + maYC).value;
      if(!urlGCN) return alert("Chưa nhập link!");
      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'adminCapNhatLinkGCN', sessionId, maYC, urlGCN, adminName }) });
      const res = await response.json();
      if (res.success) { alert("Cập nhật thành công!"); loadNoLink(); loadDashboard(); }
    }

    // --- TAB 5: LỊCH SỬ MC ---
    async function loadLichSuMC() {
      const container = document.getElementById('listLichSuMC');
      container.innerHTML = 'Đang tải...';
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getLichSuMinhChung', sessionId }) });
        const res = await response.json();
        if (res.success) {
          if (res.data.length === 0) { container.innerHTML = "Chưa có lịch sử."; return; }
          container.innerHTML = res.data.map(item => `
            <div class="border rounded-xl p-3 bg-white flex justify-between items-center shadow-sm">
              <div>
                <p class="font-bold text-gray-800">${item.hoTen} <span class="text-xs text-gray-500 font-normal">(${item.maMC})</span></p>
                <p class="text-[11px] text-gray-500">Duyệt: ${item.thoiGianDuyet} bởi ${item.admin}</p>
                ${item.ghiChu ? `<p class="text-[10px] bg-gray-100 px-2 py-1 mt-1 rounded italic">${item.ghiChu}</p>` : ''}
              </div>
              <div class="text-right flex flex-col items-end">
                <span class="px-2 py-1 text-[10px] font-bold rounded-full text-white ${item.trangThai === 'Đã duyệt' ? 'bg-green-500' : 'bg-red-500'}">${item.trangThai}</span>
                ${item.trangThai === 'Đã duyệt' ? `<span class="text-xs font-bold text-green-700 mt-1">+${item.soBuoi} buổi</span>` : ''}
              </div>
            </div>`).join('');
        }
      } catch (e) {}
    }
    let dataGCNFull = []; // Lưu trữ để tìm kiếm nhanh

// Hàm tải dữ liệu GCN
async function loadLichSuGCN() {
  const container = document.getElementById('listLichSuGCN');
  container.innerHTML = '<p class="text-center text-sm text-gray-500">Đang tải...</p>';
  try {
    const response = await fetch(API_URL, { 
      method: 'POST', 
      body: JSON.stringify({ action: 'getLichSuGCN', sessionId }) 
    });
    const res = await response.json();
    if (res.success) {
      dataGCNFull = res.data;
      renderTableGCN(dataGCNFull);
    }
  } catch (err) {
    container.innerHTML = "Lỗi kết nối.";
  }
}

// Hàm hiển thị bảng GCN
function renderTableGCN(data) {
  const container = document.getElementById('listLichSuGCN');
  if (data.length === 0) { container.innerHTML = "Không tìm thấy dữ liệu."; return; }
  
  container.innerHTML = data.map(item => `
    <div class="border rounded-xl p-3 bg-white shadow-sm flex justify-between items-center">
      <div class="flex-1">
        <p class="font-bold text-gray-800 text-sm">${item.hoTen} <span class="text-[10px] text-gray-400 font-normal">#${item.maYC}</span></p>
        <p class="text-[11px] text-gray-500">Mã: ${item.maTNV} - SĐT: ${item.sdt}</p>
        <p class="text-[11px] text-blue-600 font-medium">Loại: ${item.loaiGCN} - Hẹn: ${item.ngayHenTra}</p>
      </div>
      <div class="text-right">
        <span class="inline-block px-2 py-0.5 text-[9px] font-bold rounded-full mb-2 ${item.trangThai === 'Đã trả GCN' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
          ${item.trangThai}
        </span>
        <br>
        <button onclick="openModalGCN('${item.maYC}')" class="text-xs bg-gray-800 text-white px-3 py-1 rounded-lg">Sửa</button>
      </div>
    </div>
  `).join('');
}

// Hàm tìm kiếm (Search)
function filterGCN() {
  const key = document.getElementById('inputSearchGCN').value.toUpperCase();
  const filtered = dataGCNFull.filter(i => 
    i.maTNV.includes(key) || i.sdt.includes(key) || i.hoTen.toUpperCase().includes(key)
  );
  renderTableGCN(filtered);
}

// Điều khiển Modal
function openModalGCN(maYC) {
  const item = dataGCNFull.find(x => x.maYC === maYC);
  if(!item) return;
  document.getElementById('editMaYC').value = maYC;
  document.getElementById('editStatusGCN').value = item.trangThai;
  document.getElementById('editLinkGCN').value = item.gcnUrl || "";
  document.getElementById('editGhiChuGCN').value = item.ghiChu || "";
  document.getElementById('modalEditGCN').classList.remove('hidden');
}

function closeModalGCN() {
  document.getElementById('modalEditGCN').classList.add('hidden');
}

async function submitUpdateGCN() {
  const btn = event.target;
  btn.innerText = "Đang lưu...";
  const payload = {
    action: 'adminUpdateGCN',
    sessionId,
    maYC: document.getElementById('editMaYC').value,
    status: document.getElementById('editStatusGCN').value,
    ngayHen: document.getElementById('editNgayHenGCN').value,
    urlGCN: document.getElementById('editLinkGCN').value,
    ghiChu: document.getElementById('editGhiChuGCN').value
  };

  const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
  const res = await response.json();
  if (res.success) {
    alert("Cập nhật thành công!");
    closeModalGCN();
    loadLichSuGCN();
  } else {
    alert("Lỗi: " + res.error);
  }
  btn.innerText = "Cập nhật";
}
  </script>
